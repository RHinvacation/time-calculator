<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React 时间计算器 (修复版) </title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f5fa 0%, #dde9f2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.15);
            padding: 32px 28px;
            width: 100%;
            max-width: 680px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin: 0 0 12px 0;
            color: #1a2e4f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 span {
            background: #1e3e6e;
            color: white;
            font-size: 0.9rem;
            padding: 4px 14px;
            border-radius: 60px;
            font-weight: 400;
        }
        .sub {
            color: #2c3e66;
            margin-bottom: 28px;
            font-size: 1rem;
            border-left: 4px solid #4b7bec;
            padding-left: 16px;
            background: rgba(75, 123, 236, 0.05);
            border-radius: 0 12px 12px 0;
        }
        .field {
            margin-bottom: 24px;
            background: white;
            border-radius: 28px;
            padding: 16px 22px;
            box-shadow: 0 4px 12px rgba(0,20,40,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }
        .label-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .label-row label {
            font-weight: 600;
            color: #1e3a6b;
            font-size: 1.1rem;
            min-width: 70px;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .input-group input[type="datetime-local"] {
            flex: 2 1 240px;
            padding: 14px 18px;
            border: 1.5px solid #d0ddee;
            border-radius: 40px;
            font-size: 1rem;
            background: #f9fcff;
            transition: 0.15s;
            outline: none;
            color: #0a2540;
        }
        .input-group input[type="datetime-local"]:focus {
            border-color: #4b7bec;
            box-shadow: 0 0 0 4px rgba(75, 123, 236, 0.2);
        }
        .now-btn {
            background: white;
            border: 1.5px solid #bdd3f0;
            color: #1e3e6e;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }
        .now-btn:hover {
            background: #e5efff;
            border-color: #4b7bec;
        }
        .action-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin: 32px 0 20px;
            gap: 16px;
        }
        .calculate-btn {
            background: #1e3e6e;
            border: none;
            color: white;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(28, 60, 120, 0.3);
            flex: 1 1 auto;
        }
        .calculate-btn:hover {
            background: #234d84;
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(28, 60, 120, 0.35);
        }
        .reset-btn {
            background: transparent;
            border: 1.5px solid #98b9e9;
            color: #1e3e6e;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 1rem;
        }
        .reset-btn:hover {
            background: rgba(75, 123, 236, 0.1);
        }
        .result-box {
            background: #0e213b;
            border-radius: 32px;
            padding: 24px 28px;
            color: white;
            margin-top: 24px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2), 0 12px 24px rgba(0,10,30,0.2);
        }
        .result-box h3 {
            margin: 0 0 12px 0;
            font-weight: 500;
            color: #b3d0ff;
        }
        .diff-value {
            font-size: 2rem;
            font-weight: 700;
            background: rgba(255,255,255,0.06);
            padding: 16px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 12px 0 8px;
        }
        .diff-ms {
            font-size: 1rem;
            opacity: 0.75;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
        }
        .error-message {
            color: #ffb8b8;
            background: #5e2e3a;
            padding: 14px 22px;
            border-radius: 60px;
            font-weight: 500;
            margin: 12px 0 0;
            border-left: 5px solid #ff6b6b;
        }
        .footnote {
            color: #4c6496;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 24px;
            border-top: 1px dashed #b7cef0;
            padding-top: 20px;
        }
    </style>
</head>
<body>
<div id="root"></div>

<!-- 使用正确的 React 18 CDN 链接 -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<!-- Babel Standalone 编译 JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
    const { useState } = React;

    // 辅助：日期时间字符串 <-> 本地 Date
    function formatDateForInput(date) {
        const year = date.getFullYear();
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const day = date.getDate().toString().padStart(2, '0');
        const hours = date.getHours().toString().padStart(2, '0');
        const minutes = date.getMinutes().toString().padStart(2, '0');
        return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function parseLocalDateTime(str) {
        if (!str) return null;
        const [datePart, timePart] = str.split('T');
        if (!datePart || !timePart) return null;
        const [year, month, day] = datePart.split('-').map(Number);
        const [hour, minute] = timePart.split(':').map(Number);
        return new Date(year, month - 1, day, hour, minute, 0, 0);
    }

    function TimeCalculator() {
        const [startDate, setStartDate] = useState('');
        const [endDate, setEndDate] = useState('');
        const [diffMs, setDiffMs] = useState(null);
        const [error, setError] = useState('');

        const setStartNow = () => setStartDate(formatDateForInput(new Date()));
        const setEndNow = () => setEndDate(formatDateForInput(new Date()));

        const calculateDiff = () => {
            setError('');
            setDiffMs(null);

            const start = parseLocalDateTime(startDate);
            const end = parseLocalDateTime(endDate);

            if (!start || !end) {
                setError('❌ 请填写完整的开始和结束时间');
                return;
            }
            if (isNaN(start) || isNaN(end)) {
                setError('❌ 无效的日期时间');
                return;
            }
            if (end < start) {
                setError('⚠️ 结束时间不能早于开始时间');
                return;
            }

            setDiffMs(end.getTime() - start.getTime());
        };

        const resetAll = () => {
            setStartDate('');
            setEndDate('');
            setDiffMs(null);
            setError('');
        };

        const formatDiff = (ms) => {
            const totalSeconds = Math.floor(ms / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${days} 天 ${hours} 小时 ${minutes} 分钟 ${seconds} 秒`;
        };

        return (
            <div className="card">
                <h1>⏱️ 时间计算器 <span>本地时间</span></h1>
                <div className="sub">精确计算两个日期时间之差 (精确到秒)</div>

                <div className="field">
                    <div className="label-row">
                        <label>🔹 开始</label>
                        <button className="now-btn" onClick={setStartNow} type="button">📅 设为当前时间</button>
                    </div>
                    <input
                        type="datetime-local"
                        value={startDate}
                        onChange={(e) => setStartDate(e.target.value)}
                        style={{ width: '100%', padding: '14px 18px', borderRadius: '40px', border: '1.5px solid #d0ddee' }}
                    />
                </div>

                <div className="field">
                    <div className="label-row">
                        <label>🔸 结束</label>
                        <button className="now-btn" onClick={setEndNow} type="button">📅 设为当前时间</button>
                    </div>
                    <input
                        type="datetime-local"
                        value={endDate}
                        onChange={(e) => setEndDate(e.target.value)}
                        style={{ width: '100%', padding: '14px 18px', borderRadius: '40px', border: '1.5px solid #d0ddee' }}
                    />
                </div>

                <div className="action-area">
                    <button className="calculate-btn" onClick={calculateDiff}>🧮 计算时间差</button>
                    <button className="reset-btn" onClick={resetAll}>↻ 清空</button>
                </div>

                {error && <div className="error-message">{error}</div>}

                {diffMs !== null && !error && (
                    <div className="result-box">
                        <h3>📋 计算结果</h3>
                        <div className="diff-value">{formatDiff(diffMs)}</div>
                        <div className="diff-ms">𝗧𝗼𝘁𝗮𝗹 {diffMs.toLocaleString()} 毫秒</div>
                        <hr style={{ borderColor: '#2a4066', margin: '16px 0' }} />
                        <div style={{ fontSize: '0.9rem', opacity: 0.8 }}>
                            🕒 开始: {startDate.replace('T', ' ')}<br />
                            🕓 结束: {endDate.replace('T', ' ')}
                        </div>
                    </div>
                )}

                <div className="footnote">
                    ⚡ React 18 + Babel CDN · 时间精确到分钟 (秒默认为0) <br />
                    点击「设为当前时间」快速填入本地时间
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TimeCalculator />);
</script>
</body>
</html>
